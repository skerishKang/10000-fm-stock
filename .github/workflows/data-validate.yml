name: Data Validation

on:
  pull_request:
    paths:
      - 'data/**'
      - 'scripts/validate-data.js'
      - 'research-workspace/exports/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run data validator
        run: node scripts/validate-data.js
